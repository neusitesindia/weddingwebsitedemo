<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wedding Website — Link Generator</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300;1,400&family=Jost:wght@200;300;400;500&family=Pinyon+Script&display=swap" rel="stylesheet"/>
<style>
  :root {
    --gold: #b5935a;
    --gold-light: #d4b896;
    --gold-pale: #f0e8de;
    --cream: #faf8f5;
    --dark: #1c1714;
    --muted: #6b5e54;
    --green: #25D366;
    --green-dark: #128C7E;
  }

  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    height: 100%;
    font-family: 'Jost', sans-serif;
    background: var(--dark);
    color: var(--cream);
    overflow-x: hidden;
  }

  /* Grain overlay */
  body::before {
    content: '';
    position: fixed; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 256 256' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)' opacity='1'/%3E%3C/svg%3E");
    opacity: 0.03;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    padding: 40px 24px;
  }

  /* Header */
  .header {
    text-align: center;
    margin-bottom: 48px;
  }

  .header-script {
    font-family: 'Pinyon Script', cursive;
    font-size: clamp(2.2rem, 8vw, 4rem);
    color: var(--gold-pale);
    display: block;
    line-height: 1;
    margin-bottom: 12px;
  }

  .header-label {
    font-family: 'Jost', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 0.45em;
    text-transform: uppercase;
    color: var(--gold);
    display: block;
  }

  .divider-line {
    width: 60px;
    height: 1px;
    background: linear-gradient(to right, transparent, var(--gold), transparent);
    margin: 20px auto 0;
  }

  /* Card */
  .card {
    background: rgba(250, 248, 245, 0.04);
    border: 1px solid rgba(181, 147, 90, 0.2);
    border-radius: 2px;
    padding: 40px 32px;
    width: 100%;
    max-width: 480px;
    backdrop-filter: blur(12px);
  }

  .card-title {
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.4rem;
    font-weight: 300;
    color: var(--gold-pale);
    margin-bottom: 6px;
    letter-spacing: 0.02em;
  }

  .card-sub {
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 28px;
    padding-bottom: 24px;
    border-bottom: 1px solid rgba(181, 147, 90, 0.12);
  }

  /* Input group */
  .input-group {
    position: relative;
    margin-bottom: 24px;
  }

  .input-label {
    display: block;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }

  .input-wrap {
    position: relative;
    display: flex;
    align-items: center;
  }

  .input-icon {
    position: absolute;
    left: 14px;
    color: var(--gold-light);
    opacity: 0.6;
    pointer-events: none;
  }

  input[type="text"] {
    width: 100%;
    background: rgba(255, 255, 255, 0.04);
    border: 1px solid rgba(181, 147, 90, 0.25);
    color: var(--cream);
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.1rem;
    font-weight: 300;
    padding: 14px 14px 14px 42px;
    outline: none;
    border-radius: 1px;
    transition: border-color 0.3s, background 0.3s;
    letter-spacing: 0.03em;
    -webkit-appearance: none;
  }

  input[type="text"]::placeholder {
    color: rgba(212, 184, 150, 0.3);
    font-style: italic;
  }

  input[type="text"]:focus {
    border-color: var(--gold);
    background: rgba(181, 147, 90, 0.06);
  }

  /* Generate button */
  .btn-generate {
    width: 100%;
    background: var(--gold);
    color: var(--dark);
    border: none;
    font-family: 'Jost', sans-serif;
    font-size: 0.65rem;
    font-weight: 500;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    padding: 16px 24px;
    cursor: pointer;
    transition: background 0.3s, letter-spacing 0.3s, transform 0.15s;
    border-radius: 1px;
    margin-bottom: 0;
  }

  .btn-generate:hover {
    background: var(--gold-light);
    letter-spacing: 0.45em;
  }

  .btn-generate:active { transform: scale(0.99); }

  /* Result section */
  #result {
    display: none;
    margin-top: 32px;
    padding-top: 28px;
    border-top: 1px solid rgba(181, 147, 90, 0.12);
    animation: fadeSlideUp 0.4s ease forwards;
  }

  @keyframes fadeSlideUp {
    from { opacity: 0; transform: translateY(12px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  .result-label {
    font-size: 0.6rem;
    letter-spacing: 0.35em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 12px;
    display: block;
  }

  /* URL display box */
  .url-box {
    display: flex;
    align-items: center;
    background: rgba(181, 147, 90, 0.06);
    border: 1px solid rgba(181, 147, 90, 0.2);
    border-radius: 1px;
    margin-bottom: 16px;
    overflow: hidden;
  }

  .url-text {
    flex: 1;
    font-family: 'Jost', sans-serif;
    font-size: 0.72rem;
    color: var(--gold-light);
    padding: 13px 14px;
    word-break: break-all;
    line-height: 1.5;
    letter-spacing: 0.01em;
  }

  .btn-copy {
    background: none;
    border: none;
    border-left: 1px solid rgba(181, 147, 90, 0.2);
    color: var(--gold);
    padding: 13px 16px;
    cursor: pointer;
    transition: background 0.2s, color 0.2s;
    display: flex;
    align-items: center;
    gap: 6px;
    font-family: 'Jost', sans-serif;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    white-space: nowrap;
    flex-shrink: 0;
  }

  .btn-copy:hover { background: rgba(181, 147, 90, 0.1); }
  .btn-copy.copied { color: #7dbf82; }

  /* Action buttons row */
  .action-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .btn-action {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    padding: 13px 16px;
    border: 1px solid rgba(181, 147, 90, 0.25);
    background: transparent;
    color: var(--cream);
    font-family: 'Jost', sans-serif;
    font-size: 0.62rem;
    letter-spacing: 0.22em;
    text-transform: uppercase;
    text-decoration: none;
    cursor: pointer;
    border-radius: 1px;
    transition: all 0.3s;
  }

  .btn-action:hover {
    border-color: var(--gold);
    color: var(--gold-light);
    background: rgba(181, 147, 90, 0.06);
  }

  .btn-action.btn-whatsapp {
    border-color: rgba(37, 211, 102, 0.3);
    color: #7dd39a;
  }

  .btn-action.btn-whatsapp:hover {
    border-color: var(--green);
    background: rgba(37, 211, 102, 0.08);
    color: var(--green);
  }

  .btn-action.btn-open:hover {
    border-color: var(--gold-light);
  }

  /* Toast */
  #toast {
    position: fixed;
    bottom: 32px;
    left: 50%;
    transform: translateX(-50%) translateY(20px);
    background: rgba(28, 23, 20, 0.95);
    border: 1px solid rgba(181, 147, 90, 0.3);
    color: var(--gold-pale);
    font-family: 'Jost', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    padding: 12px 24px;
    border-radius: 2px;
    opacity: 0;
    transition: opacity 0.3s, transform 0.3s;
    pointer-events: none;
    z-index: 100;
    white-space: nowrap;
    backdrop-filter: blur(8px);
  }

  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* Footer note */
  .footer-note {
    margin-top: 32px;
    text-align: center;
    font-size: 0.6rem;
    letter-spacing: 0.2em;
    color: rgba(107, 94, 84, 0.5);
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="container">

  <div class="header">
    <span class="header-script">Wedding Links</span>
    <span class="header-label">Admin · Link Generator</span>
    <div class="divider-line"></div>
  </div>

  <div class="card">

            <path d="M12 0C5.373 0 0 5.373 0 12c0 2.127.558 4.127 1.534 5.864L.057 23.817a.5.5 0 00.624.602l6.115-1.605A11.945 11.945 0 0012 24c6.627 0 12-5.373 12-12S18.627 0 12 0zm0 22c-1.849 0-3.587-.5-5.088-1.374l-.364-.215-3.773.99 1.005-3.669-.236-.378A9.954 9.954 0 012 12C2 6.477 6.477 2 12 2s10 4.477 10 10-4.477 10-10 10z"/>
          </svg>
          WhatsApp
        </button>

        <a class="btn-action btn-open" id="open-btn" href="#" target="_blank" rel="noopener">
          <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" d="M10 6H6a2 2 0 00-2 2v10a2 2 0 002 2h10a2 2 0 002-2v-4M14 4h6m0 0v6m0-6L10 14"/>
          </svg>
          Preview
        </a>
      </div>

      <button class="btn-action btn-download" onclick="downloadHTML()" style="width:100%; margin-top:10px; border-color:rgba(181,147,90,0.35); color:var(--gold-pale);">
        <svg width="13" height="13" fill="none" stroke="currentColor" stroke-width="1.8" viewBox="0 0 24 24">
          <path stroke-linecap="round" stroke-linejoin="round" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4"/>
        </svg>
        Download index.html
      </button>
    </div>
  </div>

  <p class="footer-note">Links are private · Share only with clients</p>

</div>

<div id="toast">Link copied to clipboard</div>

round: rgba(181, 147, 90, 0.3); }\n\n  /* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     TESTIMONIAL CAROUSEL\n  \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\n  .testimonial-carousel {\n    max-width: 800px; margin: 0 auto;\n    position: relative; text-align: center;\n    padding: 0 60px;\n    min-height: 260px;\n  }\n  @media (max-width: 600px) { .testimonial-carousel { padding: 0 48px; } }\n  .t-slide {\n    position: absolute; inset: 0;\n    display: flex; flex-direction: column;\n    align-items: center; justify-content: center;\n    opacity: 0; pointer-events: none;\n    transition: opacity 0.6s ease, transform 0.6s ease;\n    transform: translateX(40px);\n  }\n  .t-slide.active {\n    opacity: 1; pointer-events: auto;\n    transform: translateX(0);\n    position: relative;\n  }\n  .t-slide.exit {\n    opacity: 0; transform: translateX(-40px);\n    position: absolute;\n  }\n  .t-dots {\n    display: flex; justify-content: center; gap: 8px;\n    margin-top: 32px;\n  }\n  .t-dot {\n    width: 6px; height: 6px;\n    border-radius: 50%;\n    background: rgba(181, 147, 90, 0.3);\n    border: none; cursor: pointer;\n    transition: all 0.3s;\n    padding: 0;\n  }\n  .t-dot.active { background: var(--gold); transform: scale(1.4); }\n  .t-prev, .t-next {\n    position: absolute; top: 50%; transform: translateY(-50%);\n    background: none; border: 1px solid rgba(181, 147, 90, 0.25);\n    color: var(--gold); width: 40px; height: 40px;\n    border-radius: 50%; cursor: pointer;\n    display: flex; align-items: center; justify-content: center;\n    transition: all 0.3s; z-index: 2;\n  }\n  .t-prev { left: 0; }\n  .t-next { right: 0; }\n  .t-prev:hover, .t-next:hover { background: var(--gold); color: #fff; border-color: var(--gold); }\n\n  /* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     TILT EFFECT (desktop only)\n  \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\n  .tilt-card {\n    transform-style: preserve-3d;\n    transition: transform 0.1s ease;\n    will-change: transform;\n  }\n  @media (max-width: 768px) {\n    .tilt-card { transform: none !important; }\n  }\n\n  /* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     SCROLL PROGRESS BAR\n  \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\n  #scroll-progress {\n    position: fixed; top: 0; left: 0; z-index: 9999;\n    height: 2px; width: 0%;\n    background: linear-gradient(90deg, var(--gold-light), var(--gold), var(--gold-light));\n    transition: width 0.05s linear;\n    pointer-events: none;\n  }\n\n  /* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     HERO SHIMMER (mobile)\n  \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\n  @keyframes heroShimmer {\n    0%   { background-position: -200% center; opacity: 0.6; }\n    50%  { background-position: 200% center; opacity: 1; }\n    100% { background-position: 200% center; opacity: 1; }\n  }\n  @media (max-width: 768px) {\n    .hero-title.shimmer {\n      background: linear-gradient(\n        105deg,\n        #fff 0%, #fff 30%,\n        var(--gold-light) 45%,\n        #fff 55%, #fff 70%,\n        var(--gold-light) 85%, #fff 100%\n      );\n      background-size: 200% auto;\n      -webkit-background-clip: text;\n      -webkit-text-fill-color: transparent;\n      background-clip: text;\n      animation: heroShimmer 1.8s ease forwards;\n      animation-delay: 1s;\n    }\n  }\n\n  /* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     REELS \u2014 custom carousel (no Swiper loop bugs)\n  \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\n  #reels {\n    padding: 80px 0 60px;\n    background: var(--dark);\n    overflow: hidden;\n  }\n  @media (min-width: 769px) { #reels { padding: 100px 0 80px; } }\n  .reels-header {\n    text-align: center;\n    padding: 0 20px;\n    margin-bottom: 56px;\n  }\n  .reels-header .section-title { color: var(--gold-pale); }\n\n  /* Portfolio slide width for auto coverflow */\n  .portfolio-swiper .swiper-slide {\n    width: 65vw; max-width: 740px;\n    height: 520px;\n    border-radius: 2px;\n    overflow: hidden;\n    position: relative;\n    cursor: grab;\n  }\n  @media (max-width: 640px) { .portfolio-swiper .swiper-slide { height: 360px; width: 85vw; } }\n  @media (min-width: 768px)  { .portfolio-swiper .swiper-slide { width: 52vw; height: 560px; } }\n  @media (min-width: 1200px) { .portfolio-swiper .swiper-slide { width: 600px; height: 600px; } }\n\n  /* \u2500\u2500 Custom reels track \u2500\u2500 */\n  .reels-viewport {\n    width: 100%;\n    overflow: hidden;\n    position: relative;\n    /* height driven by card height */\n  }\n  .reels-track {\n    display: flex;\n    align-items: center;\n    gap: 20px;\n    transition: transform 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94);\n    will-change: transform;\n    cursor: grab;\n    user-select: none;\n  }\n  .reels-track.dragging {\n    transition: none;\n    cursor: grabbing;\n  }\n\n  /* Card dimensions \u2014 9:16 */\n  .reel-card {\n    flex-shrink: 0;\n    width: 155px;\n    height: 276px;\n    border-radius: 16px;\n    overflow: hidden;\n    background: #0d0b09;\n    position: relative;\n    box-shadow: 0 8px 30px rgba(0,0,0,0.5);\n    transition: transform 0.5s ease, box-shadow 0.5s ease, opacity 0.5s ease;\n    opacity: 0.45;\n    transform: scale(0.88);\n    cursor: pointer;\n  }\n  @media (min-width: 480px)  { .reel-card { width: 175px; height: 311px; } }\n  @media (min-width: 768px)  { .reel-card { width: 220px; height: 391px; } }\n  @media (min-width: 1200px) { .reel-card { width: 270px; height: 480px; } }\n\n  .reel-card.active {\n    opacity: 1;\n    transform: scale(1.08);\n    box-shadow: 0 28px 80px rgba(0,0,0,0.75), 0 0 0 2px rgba(181,147,90,0.6);\n    z-index: 2;\n  }\n  @media (min-width: 768px)  { .reel-card.active { transform: scale(1.1); } }\n  @media (min-width: 1200px) { .reel-card.active { transform: scale(1.12); } }\n\n  .reel-card.adjacent {\n    opacity: 0.7;\n    transform: scale(0.93);\n  }\n\n  /* Play icon overlay on reel cards */\n  .reel-play-icon {\n    position: absolute;\n    top: 50%; left: 50%;\n    transform: translate(-50%, -50%);\n    z-index: 3;\n    width: 48px; height: 48px;\n    background: rgba(181,147,90,0.85);\n    border-radius: 50%;\n    display: flex; align-items: center; justify-content: center;\n    opacity: 0;\n    transition: opacity 0.3s ease;\n    pointer-events: none;\n  }\n  .reel-card:not(.active):hover .reel-play-icon { opacity: 1; }\n  .reel-card.active .reel-play-icon { opacity: 0; }\n  .reel-open-btn {\n    position: absolute;\n    bottom: 52px; left: 50%;\n    transform: translateX(-50%);\n    z-index: 4;\n    background: rgba(181,147,90,0.9);\n    border: none; cursor: pointer;\n    color: #fff;\n    font-family: var(--font-jost);\n    font-size: 0.58rem;\n    letter-spacing: 0.2em;\n    text-transform: uppercase;\n    padding: 7px 14px;\n    border-radius: 2px;\n    opacity: 0;\n    transition: opacity 0.3s ease;\n    white-space: nowrap;\n    display: flex; align-items: center; gap: 6px;\n  }\n  .reel-card.active .reel-open-btn { opacity: 1; }\n\n  /* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     VIDEO POPUP MODAL\n  \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\n  #reel-modal {\n    position: fixed; inset: 0; z-index: 3000;\n    background: rgba(8,6,4,0.96);\n    display: flex; align-items: center; justify-content: center;\n    opacity: 0; pointer-events: none;\n    transition: opacity 0.35s ease;\n    padding: 20px;\n  }\n  #reel-modal.open { opacity: 1; pointer-events: auto; }\n  #reel-modal-inner {\n    position: relative;\n    width: min(92vw, 420px);\n    /* 9:16 ratio */\n    aspect-ratio: 9/16;\n    border-radius: 20px;\n    overflow: hidden;\n    background: #000;\n    box-shadow: 0 40px 120px rgba(0,0,0,0.9), 0 0 0 1.5px rgba(181,147,90,0.4);\n    animation: modalPop 0.4s cubic-bezier(0.22, 1, 0.36, 1) forwards;\n  }\n  @keyframes modalPop {\n    from { transform: scale(0.85); opacity: 0; }\n    to   { transform: scale(1);    opacity: 1; }\n  }\n  #reel-modal-video {\n    width: 100%; height: 100%;\n    object-fit: cover;\n    display: block;\n  }\n  #reel-modal-close {\n    position: absolute; top: 14px; right: 14px;\n    background: rgba(0,0,0,0.6);\n    border: 1px solid rgba(255,255,255,0.2);\n    color: #fff; width: 40px; height: 40px;\n    border-radius: 50%; cursor: pointer;\n    display: flex; align-items: center; justify-content: center;\n    z-index: 5;\n    transition: background 0.2s;\n  }\n  #reel-modal-close:hover { background: rgba(181,147,90,0.7); }\n  #reel-modal-sound {\n    position: absolute; bottom: 16px; right: 16px;\n    background: rgba(0,0,0,0.55);\n    border: 1px solid rgba(255,255,255,0.18);\n    color: #fff; width: 40px; height: 40px;\n    border-radius: 50%; cursor: pointer;\n    display: flex; align-items: center; justify-content: center;\n    z-index: 5;\n    transition: background 0.2s;\n  }\n  #reel-modal-sound:hover { background: rgba(181,147,90,0.7); }\n  #reel-modal-label {\n    position: absolute; bottom: 16px; left: 16px;\n    font-family: var(--font-jost);\n    font-size: 0.62rem;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--gold-light);\n    z-index: 5;\n    pointer-events: none;\n  }\n  #reel-modal-gradient {\n    position: absolute; bottom: 0; left: 0; right: 0;\n    height: 100px;\n    background: linear-gradient(transparent, rgba(0,0,0,0.8));\n    pointer-events: none;\n    z-index: 4;\n  }\n\n  .reel-card video {\n    position: absolute; inset: 0;\n    width: 100%; height: 100%;\n    object-fit: cover;\n    display: block;\n    pointer-events: none;\n  }\n\n  /* Dark scrim on inactive cards */\n  .reel-card::before {\n    content: '';\n    position: absolute; inset: 0;\n    background: rgba(10,8,7,0.55);\n    border-radius: 16px;\n    pointer-events: none; z-index: 1;\n    transition: opacity 0.5s ease;\n  }\n  .reel-card.active::before { opacity: 0; }\n\n  /* Name label */\n  .reel-label {\n    position: absolute; bottom: 0; left: 0; right: 0;\n    padding: 48px 14px 16px;\n    background: linear-gradient(transparent, rgba(8,6,4,0.88));\n    border-radius: 0 0 16px 16px;\n    z-index: 2;\n    opacity: 0;\n    transition: opacity 0.35s;\n  }\n  .reel-card.active .reel-label { opacity: 1; }\n  .reel-label span {\n    font-family: var(--font-jost);\n    font-size: 0.62rem;\n    letter-spacing: 0.22em;\n    text-transform: uppercase;\n    color: var(--gold-light);\n    display: block;\n    text-align: center;\n  }\n\n  /* Dots */\n  .reels-dots {\n    display: flex; justify-content: center; gap: 8px;\n    margin-top: 28px;\n  }\n  .reels-dot {\n    width: 6px; height: 6px;\n    border-radius: 50%;\n    background: rgba(181,147,90,0.28);\n    border: none; cursor: pointer; padding: 0;\n    transition: background 0.3s, transform 0.3s;\n  }\n  .reels-dot.active {\n    background: var(--gold);\n    transform: scale(1.5);\n  }\n\n  /* Swipe hint */\n  .reels-hint {\n    text-align: center; margin-top: 14px;\n    font-family: var(--font-jost);\n    font-size: 0.58rem; letter-spacing: 0.25em; text-transform: uppercase;\n    color: rgba(255,255,255,0.22);\n    display: flex; align-items: center; justify-content: center; gap: 8px;\n  }\n  .reels-hint svg { animation: nudgeRight 1.5s ease-in-out infinite; }\n  @keyframes nudgeRight {\n    0%, 100% { transform: translateX(0); }\n    50% { transform: translateX(4px); }\n  }\n\n  /* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     PORTFOLIO SWIPER \u2014 subtle 3D depth\n  \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\n  .portfolio-swiper .swiper-slide {\n    transition: opacity 0.5s ease, box-shadow 0.5s ease;\n    opacity: 0.7;\n    box-shadow: none;\n  }\n  .portfolio-swiper .swiper-slide-active {\n    opacity: 1;\n    box-shadow: 0 16px 56px rgba(0,0,0,0.35);\n  }\n\n  /* \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\n     GLOBAL POLISH ADDITIONS\n  \u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550\u2550 */\n\n  /* Section label refinement */\n  .section-label {\n    display: inline-block;\n    font-family: var(--font-jost);\n    font-size: 0.62rem;\n    letter-spacing: 0.42em;\n    text-transform: uppercase;\n    color: var(--gold);\n    margin-bottom: 18px;\n    position: relative;\n    padding-bottom: 12px;\n  }\n  .section-label::after {\n    content: '';\n    position: absolute; bottom: 0; left: 50%; transform: translateX(-50%);\n    width: 20px; height: 1px;\n    background: currentColor;\n    opacity: 0.5;\n  }\n\n  /* Divider tweak */\n  .divider { margin: 0 auto 56px; }\n\n  /* Section title refinement */\n  .section-title {\n    letter-spacing: -0.015em;\n    line-height: 1.05;\n  }\n\n  /* Services cards hover glow */\n  .service-card {\n    transition: background 0.3s ease, transform 0.3s ease, box-shadow 0.3s ease;\n  }\n  .service-card:hover {\n    transform: translateY(-4px);\n    box-shadow: 0 12px 40px rgba(0,0,0,0.06);\n  }\n\n  /* FAQ items \u2014 smoother line */\n  .faq-item { border-bottom-color: rgba(181,147,90,0.12) !important; }\n\n  /* About section image \u2014 vignette */\n  .about-image-wrap img { filter: saturate(0.88) contrast(1.04); }\n\n  /* Contact section input focus glow */\n  .contact-input:focus {\n    border-color: var(--gold) !important;\n    box-shadow: 0 0 0 3px rgba(181,147,90,0.12) !important;\n    outline: none !important;\n  }\n\n  /* Testimonial section stars \u2014 spacing */\n  .testimonial-stars { letter-spacing: 6px; margin-bottom: 28px; }\n  .star { color: var(--gold); font-size: 1rem; }\n\n  /* Instagram grid hover */\n  .insta-item { transition: transform 0.4s ease, box-shadow 0.4s ease; }\n  .insta-item:hover { transform: scale(1.03); box-shadow: 0 12px 36px rgba(0,0,0,0.18); }\n\n  /* WhatsApp FAB pulse ring */\n  #wa-btn::before {\n    content: '';\n    position: absolute; inset: -6px;\n    border-radius: 50%;\n    border: 1.5px solid rgba(37,211,102,0.4);\n    animation: waPulse 2.5s ease-in-out infinite;\n    pointer-events: none;\n  }\n  @keyframes waPulse {\n    0%, 100% { transform: scale(1); opacity: 0.6; }\n    50% { transform: scale(1.2); opacity: 0; }\n  }\n\n  /* Mobile swiper \u2014 stories + gallery */\n  .stories-mobile-swiper,\n  .gallery-mobile-swiper { display: none; }\n\n  @media (max-width: 768px) {\n    .stories-grid { display: none !important; }\n    .masonry { display: none !important; }\n    .stories-mobile-swiper,\n    .gallery-mobile-swiper { display: block; }\n\n    .stories-mobile-swiper {\n      width: 100%; padding: 0 0 40px !important; overflow: visible !important;\n    }\n    .stories-mobile-swiper .swiper-slide { width: 80vw; max-width: 320px; }\n\n    .gallery-mobile-swiper {\n      width: 100%; padding: 0 0 40px !important; overflow: visible !important;\n    }\n    .gallery-mobile-swiper .swiper-slide {\n      width: 72vw; max-width: 280px; border-radius: 2px; overflow: hidden;\n    }\n    .gallery-mobile-swiper .swiper-slide img {\n      width: 100%; aspect-ratio: 4/5; object-fit: cover; display: block;\n    }\n  }\n</style>\n</head>\n<body>\n<!-- Scroll Progress Bar -->\n<div id=\"scroll-progress\" ss=\"star\">\u2605</span><span class=\"star\">\u2605</span><span class=\"star\">\u2605</span><span class=\"star\">\u2605</span></div>\n<p class=\"testimonial-text\">\"We had a destination wedding in Bali and the team traveled with such dedication. The cinematic film still makes us cry every time we watch it.\"</p>\n<div class=\"testimonial-divider\"></div>\n<div class=\"testimonial-author\">Rachel &amp; Tom \u00b7 Bali</div>\n</div>\n<div class=\"t-slide\">\n<div class=\"testimonial-stars\"><span class=\"star\">\u2605</span><span class=\"star\">\u2605</span><span class=\"star\">\u2605</span><span class=\"star\">\u2605</span><span class=\"star\">\u2605</span></div>\n<p class=\"testimonial-text\">\"Worth every penny. Our guests keep asking who the photographer was. The gallery was delivered early and every image was flawlessly edited.\"</p>\n<div class=\"testimonial-divider\"></div>\n<div class=\"testimonial-author\">Anna &amp; David \u00b7 Tuscany</div>\n</div>\n<!-- Dots -->\n<div class=\"t-dots\">\n<button class=\"t-dot active\" data-idx=\"0\"></button>\n<button class=\"t-dot\" data-idx=\"1\"></button>\n<button class=\"t-dot\" data-idx=\"2\"></button>\n<button class=\"t-dot\" data-idx=\"3\"></button>\n</div>\n<!-- Nav arrows -->\n<button aria-label=\"Previous\" class=\"t-prev\">\n<svg fill=\"none\" height=\"20\" stroke=\"currentColor\" viewbox=\"0 0 24 24\" width=\"20\"><path d=\"M15 19l-7-7 7-7\" stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-width=\"1.5\"></path></svg>\n</button>\n<button aria-label=\"Next\" class=\"t-next\">\n<svg fill=\"none\" height=\"20\" stroke=\"currentColor\" viewbox=\"0 0 24 24\" width=\"20\"><path d=\"M9 5l7 7-7 7\" stroke-linecap=\"round\" stroke-linejoin=\"round\" stroke-width=\"1.5\"></path></svg>\n</button>\n</div>\n</section>\n<!-- FAQ -->\n<section id=\"faq\">\n<div class=\"faq-inner\">\n<div class=\"faq-header\">\n<span class=\"section-label reveal\">FAQ</span>\n<h2 class=\"section-title reveal reveal-delay-1\">Common < oader \u2500\u2500\n  const preloader = document.getElementById('preloader');\n  const preloaderLogo = document.getElementById('preloader-logo');\n  const preloaderSub = document.getElementById('preloader-sub');\n  const preloaderBar = document.getElementById('preloader-bar');\n  const images = document.querySelectorAll('img');\n  let loaded = 0;\n  const total = images.length || 1;\n\n  setTimeout(() => {\n    preloaderLogo.style.transition = 'opacity 0.8s ease, transform 0.8s ease';\n    preloaderLogo.style.opacity = '1';\n    preloaderLogo.style.transform = 'translateY(0)';\n  }, 100);\n  setTimeout(() => {\n    preloaderSub.style.transition = 'opacity 0.6s ease';\n    preloaderSub.style.opacity = '1';\n  }, 400);\n  preloaderLogo.style.transform = 'translateY(16px)';\n\n  function onImgLoad() {\n    loaded++;\n    preloaderBar.style.width = Math.round((loaded / total) * 100) + '%';\n    if (loaded >= total) finishPreloader();\n  }\n  let preloaderDone = false;\n  function finishPreloader() {\n    if (preloaderDone) return;\n    preloaderDone = true;\n    setTimeout(() => {\n      preloader.style.transition = 'opacity 0.9s ease';\n      preloader.style.opacity = '0';\n      setTimeout(() => {\n        preloader.style.display = 'none';\n        document.getElementById('hero').classList.add('loaded');\n        animateHero();\n      }, 900);\n    }, 500);\n  }\n  images.forEach(img => {\n    if (img.complete) onImgLoad();\n    else { img.addEventListener('load', onImgLoad); img.addEventListener('error', onImgLoad); }\n  });\n  if (total === 0) finishPreloader();\n  setTimeout(finishPreloader, 5000);\n\n  // \u2500\u2500 Hero Animations \u2500\u2500\n  function animateHero() {\n    ['h1','h2','h3','h4'].forEach((id, i) => {\n      const el = document.getElementById(id);\n      if (!el) return;\n      setTimeout(() => {\n        el.style.transition = 'opacity 1s ease, transform 1s ease';\n        el.style.opacity = '1';\n        el.style.transform = 'translateY(0)';\n      }, i * 200);\n    });\n  }\n\n  // \u2500\u2500 Scroll Progress Bar \u2500\u2500\n  const progressBar = document.getElementById('scroll-progress');\n  window.addEventListener('scroll', () => {\n    const docH = document.documentElement.scrollHeight - window.innerHeight;\n    const pct = docH > 0 ? (window.scrollY / docH) * 100 : 0;\n    progressBar.style.width = pct + '%';\n  }, { passive: true });\n\n  // \u2500\u2500 Hero Shimmer (mobile only) \u2500\u2500\n  if (window.innerWidth <= 768) {\n    const heroTitle = document.getElementById('h2');\n    if (heroTitle) {\n      // Add shimmer class after hero animation has run\n      setTimeout(() => heroTitle.classList.add('shimmer'), 1200);\n    }\n  }\n\n  // \u2500\u2500 Reels Carousel \u2014 custom centred carousel, no Swiper \u2500\u2500\n  (function() {\n    const viewport = document.getElementById('reels-viewport');\n    const track = document.getElementById('reels-track');\n    const cards = Array.from(track.querySelectorAll('.reel-card'));\n    const dots = Array.from(document.querySelectorAll('#reels-dots .reels-dot'));\n    const total = cards.length;\n    let current = 2; // start on middle card\n    let cardW = 0, gap = 20;\n\n    function getCardWidth() {\n      return cards[0] ? cards[0].getBoundingClientRect().width : 155;\n    }\n\n    function updateClasses() {\n      cards.forEach((c, i) => {\n        c.classList.remove('active', 'adjacent');\n        if (i === current) c.classList.add('active');\n        else if (Math.abs(i - current) === 1) c.classList.add('adjacent');\n      });\n      dots.forEach((d, i) => d.classList.toggle('active', i === current));\n    }\n\n    function getOffset() {\n      cardW = getCardWidth();\n      const vpW = viewport.offsetWidth;\n      // centre the active card in the viewport\n      const totalTrackW = total * cardW + (total - 1) * gap;\n      const centreOfActive = current * (cardW + gap) + cardW / 2;\n      return vpW / 2 - centreOfActive;\n    }\n\n    function render(animated) {\n      if (!animated) track.style.transition = 'none';\n      else track.style.transition = 'transform 0.55s cubic-bezier(0.25, 0.46, 0.45, 0.94)';\n      track.style.transform = `translateX(${getOffset()}px)`;\n      updateClasses();\n      syncVideos();\n    }\n\n    function goTo(idx) {\n      current = Math.max(0, Math.min(idx, total - 1));\n      render(true);\n    }\n\n    function syncVideos() {\n      cards.forEach((c, i) => {\n        const vid = c.querySelector('video');\n        if (!vid) return;\n        // all play (dimmed by CSS), active one is visually prominent\n        vid.play().catch(() => {});\n      });\n    }\n\n    // Dot clicks\n    dots.forEach(d => d.addEventListener('click', () => goTo(+d.dataset.index)));\n\n    // Card clicks (click a side card to navigate to it; active card click handled by modal listener)\n    cards.forEach((c, i) => c.addEventListener('click', () => { if (i !== current) { c.dataset.dragged = 'true'; goTo(i); setTimeout(() => c.dataset.dragged = 'false', 150); } }));\n\n    // Drag / touch\n    let startX = 0, startOffset = 0, isDragging = false, moved = false;\n\n    function dragStart(x) {\n      isDragging = true; moved = false;\n      startX = x;\n      startOffset = getOffset();\n      track.classList.add('dragging');\n    }\n    function dragMove(x) {\n      if (!isDragging) return;\n      const dx = x - startX;\n      if (Math.abs(dx) > 4) moved = true;\n      track.style.transition = 'none';\n      track.style.transform = `translateX(${startOffset + dx}px)`;\n    }\n    function dragEnd(x) {\n      if (!isDragging) return;\n      isDragging = false;\n      track.classList.remove('dragging');\n      const dx = x - startX;\n      // Mark all cards as dragged if significant movement occurred\n      cards.forEach(c => c.dataset.dragged = (Math.abs(dx) > 8) ? 'true' : 'false');\n      if (Math.abs(dx) > 50) {\n        goTo(dx < 0 ? current + 1 : current - 1);\n      } else {\n        render(true); // snap back\n      }\n      // Clear dragged flag after a tick so click handler can read it\n      setTimeout(() => cards.forEach(c => c.dataset.dragged = 'false'), 100);\n    }\n\n    // Mouse\n    track.addEventListener('mousedown', e => dragStart(e.clientX));\n    window.addEventListener('mousemove', e => { if (isDragging) { e.preventDefault(); dragMove(e.clientX); } });\n    window.addEventListener('mouseup', e => dragEnd(e.clientX));\n\n    // Touch\n    track.addEventListener('touchstart', e => dragStart(e.touches[0].clientX), { passive: true });\n    track.addEventListener('touchmove', e => dragMove(e.touches[0].clientX), { passive: true });\n    track.addEventListener('touchend', e => dragEnd(e.changedTouches[0].clientX));\n\n    // Pause when out of view\n    const reelsEl = document.getElementById('reels');\n    if (reelsEl) {\n      new IntersectionObserver(entries => {\n        entries.forEach(e => {\n          cards.forEach(c => {\n            const vid = c.querySelector('video');\n            if (!vid) return;\n            if (e.isIntersecting) vid.play().catch(() => {});\n            else vid.pause();\n          });\n        });\n      }, { threshold: 0.05 }).observe(reelsEl);\n    }\n\n    // Init & recalc on resize\n    render(false);\n    let resizeTimer;\n    window.addEventListener('resize', () => {\n      clearTimeout(resizeTimer);\n      resizeTimer = setTimeout(() => render(false), 100);\n    });\n  })();\n\n  // \u2500\u2500 Portfolio Swiper \u2014 subtle coverflow depth \u2500\u2500\n  new Swiper('.portfolio-swiper', {\n    effect: 'coverflow',\n    grabCursor: true,\n    centeredSlides: true,\n    loop: true,\n    slidesPerView: 'auto',\n    autoplay: { delay: 4200, disableOnInteraction: false },\n    coverflowEffect: {\n      rotate: 12,\n      stretch: -20,\n      depth: 100,\n      modifier: 1,\n      slideShadows: false,\n    },\n    pagination: { el: '.swiper-pagination', clickable: true },\n  });\n\n  \n\n  // \u2500\u2500 Mobile Stories Swiper \u2500\u2500\n  if (window.innerWidth <= 768) {\n    new Swiper('.stories-mobile-swiper', {\n      slidesPerView: 1.15,\n      centeredSlides: true,\n      spaceBetween: 16,\n      grabCursor: true,\n      loop: false,\n      pagination: { el: '.stories-mob-pagination', clickable: true },\n    });\n\n    new Swiper('.gallery-mobile-swiper', {\n      slidesPerView: 1.3,\n      centeredSlides: true,\n      spaceBetween: 14,\n      grabCursor: true,\n      loop: false,\n      pagination: { el: '.gallery-mob-pagination', clickable: true },\n    });\n  }\n  const navbar = document.getElementById('navbar');\n  window.addEventListener('scroll', () => {\n    navbar.classList.toggle('scrolled', window.scrollY > 80);\n  }, { passive: true });\n\n  // \u2500\u2500 Mobile Menu \u2500\u2500\n  const menuBtn = document.getElementById('menuBtn');\n  const mobileMenu = document.getElementById('mobile-menu');\n  let menuOpen = false;\n  menuBtn.addEventListener('click', () => {\n    menuOpen = !menuOpen;\n    mobileMenu.classList.toggle('open', menuOpen);\n    document.body.style.overflow = menuOpen ? 'hidden' : '';\n  });\n  document.querySelectorAll('.mobile-link').forEach(link => {\n    link.addEventListener('click', () => {\n      menuOpen = false;\n      mobileMenu.classList.remove('open');\n      document.body.style.overflow = '';\n    });\n  });\n\n  // \u2500\u2500 Scroll Reveal \u2500\u2500\n  const revealObs = new IntersectionObserver((entries) => {\n    entries.forEach(e => {\n      if (e.isIntersecting) { e.target.classList.add('visible'); revealObs.unobserve(e.target); }\n    });\n  }, { threshold: 0.12 });\n  document.querySelectorAll('.reveal').forEach(el => revealObs.observe(el));\n\n  // \u2500\u2500 Counter \u2500\u2500\n  const counterObs = new IntersectionObserver((entries) => {\n    entries.forEach(e => {\n      if (!e.isIntersecting) return;\n      const target = +e.target.dataset.target;\n      let current = 0;\n      const step = target / 6 r.classList.remove('hidden');\n    const { src, caption } = lbImages[index];\n    const tmp = new Image();\n    tmp.onload = () => {\n      lbImg.src = src;\n      lbImg.alt = caption;\n      lbImg.classList.add('loaded');\n      lbLoader.classList.add('hidden');\n    };\n    tmp.onerror = () => { lbLoader.classList.add('hidden'); };\n    tmp.src = src;\n    lbCounter.textContent = `${index + 1} / ${lbImages.length}${caption ? '  \u00b7  ' + caption : ''}`;\n  }\n\n  function lbNavigate(dir) {\n    lbIndex = (lbIndex + dir + lbImages.length) % lbImages.length;\n    showLbImage(lbIndex);\n  }\n\n  // Wire up triggers \u2014 collect all lb-triggers\n  document.addEventListener('click', e => {\n    const trigger = e.target.closest('.lb-trigger');\n    if (trigger) {\n      buildLbImages();\n      const allTriggers = [...document.querySelectorAll('.lb-trigger')];\n      const idx = allTriggers.indexOf(trigger);\n      openLightbox(idx >= 0 ? idx : 0);\n    }\n  });\n\n  document.getElementById('lb-close').addEventListener('click', closeLightbox);\n  document.getElementById('lb-prev').addEventListener('click', (e) => { e.stopPropagation(); lbNavigate(-1); });\n  document.getElementById('lb-next').addEventListener('click', (e) => { e.stopPropagation(); lbNavigate(1); });\n\n  // Click backdrop to close\n  lightbox.addEventListener('click', e => {\n    if (e.target === lightbox) closeLightbox();\n  });\n\n  // Keyboard navigation\n  document.addEventListener('keydown', e => {\n    if (!lightbox.classList.contains('open')) return;\n    if (e.key === 'Escape') closeLightbox();\n    if (e.key === 'ArrowLeft') lbNavigate(-1);\n    if (e.key === 'ArrowRight') lbNavigate(1);\n  });\n\n  // Touch swipe support for lightbox\n  let lbTouchX = null;\n  lightbox.addEventListener('touchstart', e => { lbTouchX = e.touches[0].clientX; }, { passive: true });\n  lightbox.addEventListener('touchend', e => {\n    if (lbTouchX === null) return;\n    const dx = e.changedTouches[0].clientX - l     // Replace all plain text occurrences of the placeholder
    var escaped = PLACEHOLDER.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
    html = html.replace(new RegExp(escaped, 'g'), brand);

    var blob = new Blob([html], { type: 'text/html;charset=utf-8' });
    var url = URL.createObjectURL(blob);
    var a = document.createElement('a');
    a.href = url;
    a.download = 'index.html';
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
    showToast('index.html downloaded!');
  }

  function showToast(msg) {
    var toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(function() { toast.classList.remove('show'); }, 2400);
  }
</script>
</body>
</html>
