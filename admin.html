<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8"/>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Wedding Website Admin</title>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;1,400&family=Jost:wght@300;400;500&family=Pinyon+Script&display=swap" rel="stylesheet"/>
<style>
  :root {
    --gold: #b5935a;
    --gold-light: #d4b896;
    --gold-pale: #f0e8de;
    --cream: #faf8f5;
    --dark: #1c1714;
    --muted: #6b5e54;
  }
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body {
    font-family: 'Jost', sans-serif;
    background: var(--cream);
    color: var(--dark);
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 24px;
  }

  .card {
    background: #fff;
    border: 1px solid rgba(181,147,90,0.18);
    border-radius: 4px;
    padding: 48px 40px;
    width: 100%;
    max-width: 540px;
    box-shadow: 0 8px 48px rgba(28,23,20,0.08);
  }
  @media (max-width: 480px) { .card { padding: 36px 24px; } }

  .logo {
    font-family: 'Pinyon Script', cursive;
    font-size: 2.4rem;
    color: var(--gold);
    text-align: center;
    margin-bottom: 6px;
  }
  .subtitle {
    font-size: 0.62rem;
    letter-spacing: 0.38em;
    text-transform: uppercase;
    color: var(--muted);
    text-align: center;
    margin-bottom: 40px;
  }

  .divider {
    width: 40px; height: 1px;
    background: var(--gold-light);
    margin: 0 auto 36px;
  }

  label {
    display: block;
    font-size: 0.6rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--gold);
    margin-bottom: 10px;
  }

  input[type="text"] {
    width: 100%;
    border: 1px solid rgba(181,147,90,0.3);
    background: var(--cream);
    padding: 14px 16px;
    font-family: 'Cormorant Garamond', serif;
    font-size: 1.25rem;
    font-weight: 400;
    color: var(--dark);
    outline: none;
    transition: border-color 0.3s, box-shadow 0.3s;
    border-radius: 2px;
  }
  input[type="text"]::placeholder { color: rgba(107,94,84,0.45); font-style: italic; }
  input[type="text"]:focus {
    border-color: var(--gold);
    box-shadow: 0 0 0 3px rgba(181,147,90,0.1);
  }

  .generate-btn {
    width: 100%;
    margin-top: 20px;
    background: var(--dark);
    color: #fff;
    border: none;
    padding: 16px 24px;
    font-family: 'Jost', sans-serif;
    font-size: 0.65rem;
    letter-spacing: 0.3em;
    text-transform: uppercase;
    cursor: pointer;
    transition: background 0.3s, letter-spacing 0.3s;
    border-radius: 2px;
  }
  .generate-btn:hover { background: var(--gold); letter-spacing: 0.38em; }

  /* Result panel */
  .result {
    margin-top: 32px;
    display: none;
  }
  .result.visible { display: block; }

  .result-divider {
    width: 100%; height: 1px;
    background: rgba(181,147,90,0.18);
    margin-bottom: 28px;
  }

  .result-label {
    font-size: 0.58rem;
    letter-spacing: 0.32em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 10px;
  }

  .link-box {
    display: flex;
    align-items: center;
    gap: 10px;
    background: var(--cream);
    border: 1px solid rgba(181,147,90,0.25);
    border-radius: 2px;
    padding: 12px 14px;
    margin-bottom: 20px;
  }
  .link-text {
    flex: 1;
    font-size: 0.82rem;
    color: var(--dark);
    font-family: monospace;
    word-break: break-all;
    line-height: 1.5;
  }
  .copy-btn {
    flex-shrink: 0;
    background: none;
    border: 1px solid rgba(181,147,90,0.4);
    color: var(--gold);
    padding: 7px 14px;
    font-family: 'Jost', sans-serif;
    font-size: 0.58rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    cursor: pointer;
    border-radius: 2px;
    transition: all 0.25s;
    white-space: nowrap;
  }
  .copy-btn:hover { background: var(--gold); color: #fff; border-color: var(--gold); }
  .copy-btn.copied { background: #2a9d5c; color: #fff; border-color: #2a9d5c; }

  .action-row {
    display: flex;
    gap: 12px;
    flex-wrap: wrap;
  }

  .wa-btn, .dl-btn {
    flex: 1;
    min-width: 140px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 14px 20px;
    border-radius: 2px;
    font-family: 'Jost', sans-serif;
    font-size: 0.62rem;
    letter-spacing: 0.25em;
    text-transform: uppercase;
    cursor: pointer;
    text-decoration: none;
    transition: all 0.25s;
    border: none;
    font-weight: 400;
  }

  .wa-btn {
    background: #25D366;
    color: #fff;
  }
  .wa-btn:hover { background: #1ebe5c; }

  .dl-btn {
    background: var(--gold-pale);
    color: var(--dark);
    border: 1px solid rgba(181,147,90,0.3);
  }
  .dl-btn:hover { background: var(--gold); color: #fff; border-color: var(--gold); }

  .toast {
    position: fixed;
    bottom: 24px; left: 50%;
    transform: translateX(-50%) translateY(60px);
    background: var(--dark);
    color: #fff;
    padding: 12px 24px;
    border-radius: 2px;
    font-size: 0.7rem;
    letter-spacing: 0.2em;
    text-transform: uppercase;
    opacity: 0;
    transition: all 0.35s ease;
    pointer-events: none;
    white-space: nowrap;
    z-index: 999;
  }
  .toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  .preview-note {
    margin-top: 16px;
    font-size: 0.72rem;
    color: var(--muted);
    text-align: center;
    line-height: 1.6;
  }
  .preview-note a {
    color: var(--gold);
    text-decoration: none;
    border-bottom: 1px solid rgba(181,147,90,0.35);
  }
</style>
</head>
<body>

<div class="card">
  <div class="logo">Admin Panel</div>
  <div class="subtitle">Wedding Website Generator</div>
  <div class="divider"></div>

  <label for="brandInput">Brand / Studio Name</label>
  <input
    type="text"
    id="brandInput"
    placeholder="e.g. White Weddings"
    autocomplete="off"
    spellcheck="false"
  />
  <button class="generate-btn" onclick="generate()">Generate Shareable Link</button>

  <div class="result" id="result">
    <div class="result-divider"></div>

    <div class="result-label">Shareable Link</div>
    <div class="link-box">
      <span class="link-text" id="linkText"></span>
      <button class="copy-btn" id="copyBtn" onclick="copyLink()">Copy</button>
    </div>

    <div class="action-row">
      <a class="wa-btn" id="waBtn" href="#" target="_blank">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
          <path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413Z"/>
        </svg>
        Share on WhatsApp
      </a>
      <button class="dl-btn" onclick="downloadHTML()">
        <svg width="16" height="16" fill="none" stroke="currentColor" viewBox="0 0 24 24">
          <path d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1M16 12l-4 4m0 0l-4-4m4 4V4" stroke-linecap="round" stroke-linejoin="round" stroke-width="1.5"/>
        </svg>
        Download index.html
      </button>
    </div>

    <p class="preview-note">
      Preview: <a id="previewLink" href="#" target="_blank">Open in browser →</a>
    </p>
  </div>
</div>

<div class="toast" id="toast">Copied to clipboard</div>

<script>
  const BASE_URL = 'https://neusitesindia.github.io/weddingwebsitedemo/';
  let currentBrand = '';
  let currentLink = '';

  function generate() {
    const input = document.getElementById('brandInput');
    const brand = input.value.trim();
    if (!brand) {
      input.focus();
      input.style.borderColor = '#c0392b';
      setTimeout(() => input.style.borderColor = '', 1500);
      return;
    }
    currentBrand = brand;
    const encoded = encodeURIComponent(brand);
    currentLink = BASE_URL + '?brand=' + encoded;

    document.getElementById('linkText').textContent = currentLink;
    document.getElementById('previewLink').href = currentLink;

    const waMsg = encodeURIComponent('Here is your wedding website preview:\n' + currentLink);
    document.getElementById('waBtn').href = 'https://wa.me/?text=' + waMsg;

    const result = document.getElementById('result');
    result.classList.add('visible');
    result.scrollIntoView({ behavior: 'smooth', block: 'nearest' });

    document.getElementById('copyBtn').textContent = 'Copy';
    document.getElementById('copyBtn').classList.remove('copied');
  }

  function copyLink() {
    navigator.clipboard.writeText(currentLink).then(() => {
      const btn = document.getElementById('copyBtn');
      btn.textContent = 'Copied!';
      btn.classList.add('copied');
      showToast('Link copied to clipboard');
      setTimeout(() => {
        btn.textContent = 'Copy';
        btn.classList.remove('copied');
      }, 2500);
    }).catch(() => {
      // Fallback
      const ta = document.createElement('textarea');
      ta.value = currentLink;
      ta.style.position = 'fixed';
      ta.style.opacity = '0';
      document.body.appendChild(ta);
      ta.select();
      document.execCommand('copy');
      document.body.removeChild(ta);
      showToast('Link copied to clipboard');
    });
  }

  function showToast(msg) {
    const toast = document.getElementById('toast');
    toast.textContent = msg;
    toast.classList.add('show');
    setTimeout(() => toast.classList.remove('show'), 2200);
  }

  async function downloadHTML() {
    if (!currentBrand) return;

    showToast('Preparing download…');

    try {
      // Fetch the index.html template from the same directory
      const res = await fetch('index.html');
      let html = await res.text();

      // Replace all placeholders with the brand name
      const brand = currentBrand;
      const handle = brand.toLowerCase().replace(/\s+/g, '_');

      // Replace template placeholders
      html = html.replace(/\{\{BRAND_NAME\}\}/g, brand);
      html = html.replace(/\{\{BRAND_HANDLE\}\}/g, handle);

      // Remove the brand injection script block (the guard/redirect logic)
      // since this is a baked version with the name already filled in
      html = html.replace(/<script>\s*\(function\(\) \{[\s\S]*?var params = new URLSearchParams[\s\S]*?\}\)\(\);\s*<\/script>/, '');

      const blob = new Blob([html], { type: 'text/html' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = 'index.html';
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      URL.revokeObjectURL(url);
      showToast('Downloaded successfully');
    } catch (e) {
      showToast('Download failed — check console');
      console.error(e);
    }
  }

  // Allow Enter key to trigger generate
  document.getElementById('brandInput').addEventListener('keydown', function(e) {
    if (e.key === 'Enter') generate();
  });
</script>
</body>
</html>
